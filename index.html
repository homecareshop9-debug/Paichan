<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PaichaN+ | Official Launch 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Outfit', sans-serif; background: #000814; color: #fff; margin:0; }
        .gold-grad { background: linear-gradient(135deg, #c5a059 0%, #f1d38e 50%, #c5a059 100%); color: #000; }
        .input-luxury { background: rgba(255,255,255,0.05); border: 1px solid rgba(197, 160, 89, 0.2); padding: 14px; border-radius: 14px; outline: none; width: 100%; color: white; margin-bottom: 10px; }
        .btn-main { padding: 16px; border-radius: 16px; font-weight: 900; text-transform: uppercase; width: 100%; cursor: pointer; transition: 0.3s; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // আপনার স্ক্রিনশট থেকে নেওয়া কনফিগারেশন
        const firebaseConfig = {
            apiKey: "AIzaSyC8xyH5J923wDob7R4icRpAp3SCbeaXx70",
            authDomain: "earncash-2b12f.firebaseapp.com",
            projectId: "earncash-2b12f",
            storageBucket: "earncash-2b12f.appspot.com",
            messagingSenderId: "829794818209",
            appId: "1:829794818209:web:60df663d39c69eadf2f8e0"
        };

        const app = initializeApp(firebaseConfig);
        window.auth = getAuth(app);
        window.db = getFirestore(app);
        window.api = { signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, doc, setDoc, getDoc };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('login');
            const [email, setEmail] = useState('');
            const [pass, setPass] = useState('');
            const [loading, setLoading] = useState(false);

            // লগইন হ্যান্ডলার
            const handleSignIn = async () => {
                if (!email || !pass) return alert("Email এবং Password লিখুন!");
                setLoading(true);
                try {
                    await window.api.signInWithEmailAndPassword(window.auth, email.trim(), pass);
                    alert("লগইন সফল হয়েছে!");
                    setView('home');
                } catch (e) {
                    alert("Error: " + e.message);
                }
                setLoading(false);
            };

            // নতুন অ্যাকাউন্ট খোলার হ্যান্ডলার (Customer/Seller)
            const handleSignUp = async (role) => {
                if (!email || !pass) return alert("Email এবং Password লিখুন!");
                setLoading(true);
                try {
                    const res = await window.api.createUserWithEmailAndPassword(window.auth, email.trim(), pass);
                    await window.api.setDoc(window.api.doc(window.db, "users", res.user.uid), {
                        email: email.trim(),
                        role: role,
                        createdAt: new Date()
                    });
                    alert("অ্যাকাউন্ট তৈরি হয়েছে!");
                    setView('home');
                } catch (e) {
                    alert("Error: " + e.message);
                }
                setLoading(false);
            };

            if (view === 'home') return <div className="p-10 text-center"><h1>স্বাগতম PAICHAN+ এ!</h1></div>;

            return (
                <div className="max-w-md mx-auto min-h-screen bg-[#000814] flex flex-col justify-center p-10">
                    <h1 className="text-4xl font-black italic text-center mb-10 text-white">PAICHAN<span className="text-[#c5a059]">+</span></h1>
                    
                    {/* INPUTS - onChange এবং value সেট করা হয়েছে */}
                    <input 
                        type="email"
                        className="input-luxury" 
                        placeholder="GMAIL ID" 
                        value={email}
                        onChange={(e) => setEmail(e.target.value)} 
                    />
                    <input 
                        type="password"
                        className="input-luxury" 
                        placeholder="PASSWORD" 
                        value={pass}
                        onChange={(e) => setPass(e.target.value)} 
                    />

                    <button 
                        onClick={handleSignIn} 
                        disabled={loading}
                        className="gold-grad btn-main mb-4"
                    >
                        {loading ? "Checking..." : "Sign In"}
                    </button>

                    <div className="flex justify-between text-[10px] font-black opacity-40 uppercase px-2 mb-10">
                        <span onClick={() => handleSignUp('customer')} className="cursor-pointer hover:text-[#c5a059]">Create Account</span>
                        <span className="cursor-pointer">Forgot Password</span>
                    </div>

                    <button 
                        onClick={() => handleSignUp('seller')}
                        className="w-full border border-[#c5a059]/20 p-4 rounded-2xl text-[10px] font-black text-[#c5a059] uppercase tracking-[2px]"
                    >
                        Become a PaichaN Seller
                    </button>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
